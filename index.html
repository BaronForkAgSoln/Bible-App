<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bible">
<meta name="theme-color" content="#FDFDFB">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>The Holy Bible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FDFDFB;
    --ink: #1C1B1A;
    --rubric: #8C2F2F;      /* the red of rubricated manuscripts */
    --rule: #DAD7D2;
    --muted: #7A756E;
    --hover: #F3F1EC;
    --serif: "EB Garamond", Georgia, "Times New Roman", serif;
    --sans: "Inter", -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: var(--paper); color: var(--ink); font-family: var(--serif); min-height: 100vh; }

  /* ---------- Top bar ---------- */
  header {
    display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
    padding: 1.1rem 1.5rem 0.9rem; border-bottom: 1px solid var(--rule);
  }
  header h1 { font-weight: 500; font-size: 1.25rem; letter-spacing: 0.16em; text-transform: uppercase; }
  header h1 span { color: var(--rubric); }
  .trans-wrap {
    display: flex; align-items: center; gap: 0.5rem;
    font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
  }
  select {
    font-family: var(--sans); font-size: 0.8rem; color: var(--ink);
    background: var(--paper); border: 1px solid var(--rule); border-radius: 4px;
    padding: 0.35rem 0.5rem; cursor: pointer; max-width: 15rem;
  }
  select:focus-visible { outline: 2px solid var(--rubric); outline-offset: 1px; }

  .view { display: none; }
  .view.show { display: block; }

  /* ---------- Page 1: Books ---------- */
  #booksView { padding: 2rem clamp(1.25rem, 5vw, 4rem) 4rem; max-width: 62rem; margin: 0 auto; }
  .testament-label {
    font-family: var(--sans); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--rubric); margin: 2rem 0 0.8rem;
    display: flex; align-items: center; gap: 0.9rem;
  }
  .testament-label::after { content: ""; flex: 1; height: 1px; background: var(--rule); }
  .testament-label:first-child { margin-top: 0; }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 6px; }
  .book-grid button {
    font-family: var(--sans); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em;
    padding: 0.7rem 0; background: none; border: 1px solid var(--rule); border-radius: 5px;
    color: var(--ink); cursor: pointer;
  }
  .book-grid button:hover { background: var(--hover); }
  .book-grid button:focus-visible { outline: 2px solid var(--rubric); outline-offset: 1px; }
  .book-grid button:disabled { color: var(--rule); border-color: var(--hover); cursor: default; background: none; }

  /* ---------- Page 2: Reading ---------- */
  #readView { padding: 1.4rem clamp(1.25rem, 5vw, 4rem) 4rem; max-width: 46rem; margin: 0 auto; }
  .read-top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .read-tools { margin-left: auto; display: flex; gap: 4px; }
  .back-btn {
    font-family: var(--sans); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
    background: none; border: 1px solid var(--rule); border-radius: 4px;
    padding: 0.45rem 0.8rem; color: var(--ink); cursor: pointer; white-space: nowrap;
  }
  .back-btn:hover { background: var(--hover); }
  .back-btn:disabled { color: var(--rule); cursor: default; background: none; }
  .back-btn:focus-visible { outline: 2px solid var(--rubric); outline-offset: 1px; }
  .read-top .bookname { font-size: 1.3rem; font-weight: 500; letter-spacing: 0.05em; }

  .chapter-strip {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding-bottom: 1.1rem; border-bottom: 1px solid var(--rule); margin-bottom: 1.6rem;
  }
  .chapter-strip button {
    font-family: var(--sans); font-size: 0.74rem; min-width: 36px; padding: 0.45rem 0.3rem;
    background: none; border: 1px solid var(--rule); border-radius: 4px;
    color: var(--ink); cursor: pointer;
  }
  .chapter-strip button:hover { background: var(--hover); }
  .chapter-strip button:focus-visible { outline: 2px solid var(--rubric); outline-offset: 1px; }
  .chapter-strip button.active { background: var(--rubric); border-color: var(--rubric); color: var(--paper); }

  .welcome { color: var(--muted); font-size: 1.05rem; font-style: italic; margin-top: 1rem; }

  .passage-head { display: flex; align-items: baseline; gap: 0.9rem; margin-bottom: 1.1rem; }
  .passage-head .chapnum { font-size: 3.2rem; line-height: 1; color: var(--rubric); }
  .passage-head .transname {
    font-family: var(--sans); font-size: 0.68rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }

  .scripture { font-size: var(--fs, 1.16rem); line-height: 1.75; }
  .scripture sup,
  .scripture .v {
    font-family: var(--sans); font-size: 0.62em; font-weight: 500; color: var(--rubric);
    margin-right: 0.25em; vertical-align: super; line-height: 0;
  }
  .scripture p { margin-bottom: 0.6rem; }
  /* API.Bible section headings and poetry classes */
  .scripture h3, .scripture .s, .scripture .s1, .scripture .s2 {
    font-family: var(--sans); font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    margin: 1.4rem 0 0.5rem;
  }
  .scripture .q, .scripture .q1 { margin-left: 1.2rem; }
  .scripture .q2 { margin-left: 2.4rem; }
  .scripture .d { font-style: italic; color: var(--muted); }

  .pager {
    display: flex; justify-content: space-between; margin-top: 2.2rem;
    padding-top: 1.1rem; border-top: 1px solid var(--rule);
  }
  .pager button {
    font-family: var(--sans); font-size: 0.78rem; letter-spacing: 0.06em;
    background: none; border: 1px solid var(--rule); border-radius: 4px;
    padding: 0.5rem 0.9rem; color: var(--ink); cursor: pointer;
  }
  .pager button:hover { background: var(--hover); }
  .pager button:focus-visible { outline: 2px solid var(--rubric); outline-offset: 1px; }
  .pager button[hidden] { visibility: hidden; }

  .status { color: var(--muted); font-style: italic; margin-top: 1.5rem; }
  .status.error { color: var(--rubric); font-style: normal; font-family: var(--sans); font-size: 0.85rem; }

  /* ---------- Verse selection & exegesis ---------- */
  .verse { cursor: pointer; border-radius: 3px; }
  .verse:hover { background: var(--hover); }
  .verse.sel { background: #F5E6E6; box-shadow: 0 0 0 3px #F5E6E6; }
  .sel-bar {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(1.1rem + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: center;
    gap: 0.7rem;
    background: var(--ink);
    color: var(--paper);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    box-shadow: 0 4px 18px rgba(28,27,26,0.25);
    z-index: 20;
    max-width: min(92vw, 40rem);
  }
  .sel-bar .sel-ref {
    font-family: var(--sans);
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .sel-bar button {
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    background: none;
    border: 1px solid rgba(253,253,251,0.35);
    border-radius: 5px;
    padding: 0.4rem 0.8rem;
    color: var(--paper);
    cursor: pointer;
    white-space: nowrap;
  }
  .sel-bar button:hover { background: rgba(253,253,251,0.12); }
  .sel-bar #exegesisBtn { border-color: transparent; background: var(--rubric); }
  .toast {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(4.6rem + env(safe-area-inset-bottom, 0px));
    background: var(--rubric);
    color: var(--paper);
    font-family: var(--sans);
    font-size: 0.8rem;
    border-radius: 6px;
    padding: 0.55rem 0.9rem;
    z-index: 21;
    box-shadow: 0 4px 14px rgba(140,47,47,0.3);
  }

  /* ---------- Exegesis panel ---------- */
  .exegesis-panel {
    margin-top: 2rem;
    border-left: 3px solid var(--rubric);
    background: #F8F5F0;
    padding: 1.1rem 1.4rem 1.3rem;
    border-radius: 0 6px 6px 0;
  }
  .exegesis-panel .ex-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    font-family: var(--sans);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rubric);
    margin-bottom: 0.8rem;
  }
  .exegesis-panel .ex-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }
  .exegesis-panel .ex-close:hover { color: var(--ink); }
  .ex-body { font-size: calc(var(--fs, 1.16rem) * 0.9); line-height: 1.7; }
  .ex-body p { margin-bottom: 0.7rem; }
  .ex-body h3, .ex-body h4 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.02em;
    margin: 1.1rem 0 0.4rem;
  }
  .ex-body ul, .ex-body ol { margin: 0.3rem 0 0.8rem 1.4rem; }
  .ex-body li { margin-bottom: 0.25rem; }
  .ex-body .ex-status { color: var(--muted); font-style: italic; }

  @media (prefers-reduced-motion: no-preference) {
    .scripture { animation: fadein 0.25s ease; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  }
</style>
</head>
<body>

<header>
  <h1>The Holy <span>Bible</span></h1>
  <div class="trans-wrap">
    <label for="translation">Translation</label>
    <select id="translation"></select>
  </div>
</header>

<!-- Page 1: books -->
<div class="view show" id="booksView">
  <div class="testament-label">Old Testament</div>
  <div class="book-grid" id="otGrid"></div>
  <div class="testament-label">New Testament</div>
  <div class="book-grid" id="ntGrid"></div>
</div>

<!-- Page 2: chapters + reading -->
<div class="view" id="readView">
  <div class="read-top">
    <button class="back-btn" id="backBtn">&larr; Books</button>
    <div class="bookname" id="bookName"></div>
    <div class="read-tools">
      <button class="back-btn" id="sizeDown" title="Smaller text">A&minus;</button>
      <button class="back-btn" id="sizeUp" title="Larger text">A+</button>
      <button class="back-btn" id="emailBtn" title="Email this chapter">&#9993; Email</button>
      <button class="back-btn" id="emailEditBtn" title="Change email address">&#9998;</button>
      <button class="back-btn" id="keyBtn" title="Anthropic API key for exegesis">&#128273;</button>
    </div>
  </div>
  <div class="chapter-strip" id="chapterStrip"></div>
  <div id="reader"></div>
  <div class="sel-bar" id="selBar" hidden>
    <span class="sel-ref" id="selRef"></span>
    <button id="exegesisBtn">&#10022; Exegesis</button>
    <button id="selClearBtn">Clear</button>
  </div>
  <div class="toast" id="toast" hidden></div>
</div>

<script>
/* =========================================================
   SOURCES
   Source A — bible-api.com   (public domain, no key)
   Source B — API.Bible       (American Bible Society, keyed)
   ========================================================= */
const API_BIBLE = {
  endpoint: "https://rest.api.bible",
  key: "vKdfe3VftRWZ-djccZlMz"
};

// Leave empty to list every English Bible your key can access.
// To trim the dropdown, put chosen Bible IDs here, e.g.:
//   const FEATURED_API_BIBLES = ["de4e12af7f28f599-02", "01b29f4b342acc35-01"];
const FEATURED_API_BIBLES = [];

const FREE_TRANSLATIONS = [
  ["kjv",   "KJV — King James"],
  ["asv",   "ASV — American Standard"],
  ["web",   "WEB — World English"],
  ["webbe", "WEBBE — World English (British)"],
  ["darby", "Darby"],
  ["ylt",   "YLT — Young's Literal (NT only)"],
  ["dra",   "DRA — Douay-Rheims"]
];
const NT_ONLY = new Set(["free:ylt"]);

/* ---------- Canon ---------- */
const OT = [
  ["GEN","Genesis",50],["EXO","Exodus",40],["LEV","Leviticus",27],["NUM","Numbers",36],
  ["DEU","Deuteronomy",34],["JOS","Joshua",24],["JDG","Judges",21],["RUT","Ruth",4],
  ["1SA","1 Samuel",31],["2SA","2 Samuel",24],["1KI","1 Kings",22],["2KI","2 Kings",25],
  ["1CH","1 Chronicles",29],["2CH","2 Chronicles",36],["EZR","Ezra",10],["NEH","Nehemiah",13],
  ["EST","Esther",10],["JOB","Job",42],["PSA","Psalms",150],["PRO","Proverbs",31],
  ["ECC","Ecclesiastes",12],["SNG","Song of Solomon",8],["ISA","Isaiah",66],["JER","Jeremiah",52],
  ["LAM","Lamentations",5],["EZK","Ezekiel",48],["DAN","Daniel",12],["HOS","Hosea",14],
  ["JOL","Joel",3],["AMO","Amos",9],["OBA","Obadiah",1],["JON","Jonah",4],
  ["MIC","Micah",7],["NAM","Nahum",3],["HAB","Habakkuk",3],["ZEP","Zephaniah",3],
  ["HAG","Haggai",2],["ZEC","Zechariah",14],["MAL","Malachi",4]
];
const NT = [
  ["MAT","Matthew",28],["MRK","Mark",16],["LUK","Luke",24],["JHN","John",21],
  ["ACT","Acts",28],["ROM","Romans",16],["1CO","1 Corinthians",16],["2CO","2 Corinthians",13],
  ["GAL","Galatians",6],["EPH","Ephesians",6],["PHP","Philippians",4],["COL","Colossians",4],
  ["1TH","1 Thessalonians",5],["2TH","2 Thessalonians",3],["1TI","1 Timothy",6],["2TI","2 Timothy",4],
  ["TIT","Titus",3],["PHM","Philemon",1],["HEB","Hebrews",13],["JAS","James",5],
  ["1PE","1 Peter",5],["2PE","2 Peter",3],["1JN","1 John",5],["2JN","2 John",1],
  ["3JN","3 John",1],["JUD","Jude",1],["REV","Revelation",22]
];
const ALL = [...OT, ...NT];

const state = { translation: "free:kjv", book: null, chapter: null };
const $ = id => document.getElementById(id);
const transSelect = $("translation");

/* ---------- Translation dropdown ---------- */
function populateFreeTranslations() {
  const group = document.createElement("optgroup");
  group.label = "Public domain";
  for (const [id, label] of FREE_TRANSLATIONS) {
    const o = document.createElement("option");
    o.value = "free:" + id;
    o.textContent = label;
    group.appendChild(o);
  }
  transSelect.appendChild(group);
  transSelect.value = "free:kjv";
}

async function populateApiBibles() {
  try {
    const res = await fetch(`${API_BIBLE.endpoint}/v1/bibles?language=eng`, {
      headers: { "api-key": API_BIBLE.key }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { data } = await res.json();
    let bibles = data || [];
    if (FEATURED_API_BIBLES.length) {
      bibles = bibles.filter(b => FEATURED_API_BIBLES.includes(b.id));
    }
    bibles.sort((a, b) => (a.abbreviationLocal || a.abbreviation || "").localeCompare(b.abbreviationLocal || b.abbreviation || ""));
    if (!bibles.length) return;
    const group = document.createElement("optgroup");
    group.label = "API.Bible";
    for (const b of bibles) {
      const o = document.createElement("option");
      o.value = "ab:" + b.id;
      o.textContent = `${b.abbreviationLocal || b.abbreviation} — ${b.name}`;
      group.appendChild(o);
    }
    transSelect.appendChild(group);
  } catch (err) {
    console.warn("API.Bible catalog unavailable:", err.message);
  }
}

/* ---------- FUMS (required by API.Bible license) ---------- */
let fumsLoaded = false;
function reportFums(token) {
  if (!token) return;
  const fire = () => { try { window._BAPI && window._BAPI.t(token); } catch (e) {} };
  if (fumsLoaded) { fire(); return; }
  const s = document.createElement("script");
  s.src = "https://cdn.scripture.api.bible/fums/fumsv3.min.js";
  s.onload = () => { fumsLoaded = true; fire(); };
  document.head.appendChild(s);
}

/* ---------- Views & navigation ---------- */
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("show", v.id === id));
  window.scrollTo(0, 0);
}

function buildGrid(el, books) {
  el.innerHTML = "";
  for (const [code, name] of books) {
    const b = document.createElement("button");
    b.textContent = code;
    b.title = name;
    b.dataset.code = code;
    b.addEventListener("click", () => openBook(code));
    el.appendChild(b);
  }
}
buildGrid($("otGrid"), OT);
buildGrid($("ntGrid"), NT);

function refreshGridState() {
  const otDisabled = NT_ONLY.has(state.translation);
  document.querySelectorAll("#otGrid button").forEach(b => b.disabled = otDisabled);
}

function openBook(code) {
  state.book = code;
  state.chapter = null;
  const [, name, chapters] = ALL.find(b => b[0] === code);
  $("bookName").textContent = name;
  const strip = $("chapterStrip");
  strip.innerHTML = "";
  for (let c = 1; c <= chapters; c++) {
    const b = document.createElement("button");
    b.textContent = c;
    b.addEventListener("click", () => loadChapter(code, c));
    strip.appendChild(b);
  }
  $("reader").innerHTML = `<p class="welcome">Select a chapter of ${name}.</p>`;
  selectedVerses.clear();
  currentChapter = null;
  updateSelBar();
  showView("readView");
}

/* ---------- Chapter loading (two sources) ---------- */
async function loadChapter(code, chapter) {
  const [, name, chapterCount] = ALL.find(b => b[0] === code);
  state.book = code;
  state.chapter = chapter;
  document.querySelectorAll("#chapterStrip button").forEach(b =>
    b.classList.toggle("active", Number(b.textContent) === chapter));
  const reader = $("reader");
  reader.innerHTML = `<p class="status">Loading ${name} ${chapter}&hellip;</p>`;

  const transName = transSelect.options[transSelect.selectedIndex]?.text || "";
  const head = `
    <div class="passage-head">
      <span class="chapnum">${chapter}</span>
      <div class="transname">${transName}</div>
    </div>`;
  const pager = `
    <div class="pager">
      <button id="prevCh" ${chapter <= 1 ? "hidden" : ""}>&larr; ${name} ${chapter - 1}</button>
      <button id="nextCh" ${chapter >= chapterCount ? "hidden" : ""}>${name} ${chapter + 1} &rarr;</button>
    </div>`;

  try {
    let bodyHtml, fumsToken = null, plainText = "";
    const [source, id] = splitSel(state.translation);

    if (source === "free") {
      const res = await fetch(`https://bible-api.com/data/${id}/${code}/${chapter}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const verses = data.verses || [];
      if (!verses.length) throw new Error("No verses returned");
      bodyHtml = "<p>" + verses.map(v =>
        `<span class="verse" data-v="${v.verse}"><sup>${v.verse}</sup>${escapeHtml(v.text.trim())}</span>`).join(" ") + "</p>";
      plainText = verses.map(v => `${v.verse} ${v.text.trim().replace(/\s+/g, " ")}`).join("\n");
      chapterVerses = verses.map(v => ({ n: Number(v.verse), text: v.text.trim().replace(/\s+/g, " ") }));
    } else {
      const url = `${API_BIBLE.endpoint}/v1/bibles/${id}/chapters/${code}.${chapter}` +
        `?content-type=html&include-titles=true&include-chapter-numbers=false&include-verse-numbers=true`;
      const res = await fetch(url, { headers: { "api-key": API_BIBLE.key } });
      if (res.status === 404) throw new Error("This Bible doesn't include this chapter");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      bodyHtml = json.data && json.data.content ? json.data.content : "";
      if (!bodyHtml) throw new Error("No content returned");
      fumsToken = (json.meta && (json.meta.fumsToken || json.meta.fumsId)) || null;
      const tmp = document.createElement("div");
      tmp.innerHTML = bodyHtml;
      plainText = tmp.textContent.replace(/[ \t]+/g, " ").replace(/\n{3,}/g, "\n\n").trim();
      chapterVerses = null; // verse selection is available on public domain translations for now
    }

    currentChapter = { ref: `${name} ${chapter}`, book: name, chapter, trans: transName, text: plainText };
    selectedVerses.clear();
    updateSelBar();

    reader.innerHTML = head + `<div class="scripture">${bodyHtml}</div>` + pager;
    if (chapter > 1) $("prevCh").addEventListener("click", () => loadChapter(code, chapter - 1));
    if (chapter < chapterCount) $("nextCh").addEventListener("click", () => loadChapter(code, chapter + 1));
    reportFums(fumsToken);
  } catch (err) {
    reader.innerHTML = `<p class="status error">Couldn't load ${name} ${chapter} (${err.message}).
      Check your connection and try again, or switch translations above.</p>`;
  }
}

function splitSel(v) {
  const i = v.indexOf(":");
  return [v.slice(0, i), v.slice(i + 1)];
}
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/* ---------- Events ---------- */
let currentChapter = null;
let chapterVerses = null;             // [{n, text}] when the source provides verse data
const selectedVerses = new Set();

/* ---------- Verse selection & exegesis (prototype: hands off to Claude) ---------- */
$("reader").addEventListener("click", (e) => {
  const el = e.target.closest(".verse");
  if (!el) return;
  const n = Number(el.dataset.v);
  if (selectedVerses.has(n)) selectedVerses.delete(n);
  else selectedVerses.add(n);
  el.classList.toggle("sel", selectedVerses.has(n));
  updateSelBar();
});

function selRange() {
  const ns = [...selectedVerses].sort((a, b) => a - b);
  return ns.length ? [ns[0], ns[ns.length - 1]] : null;
}

function updateSelBar() {
  const bar = $("selBar");
  const r = selRange();
  if (!r || !currentChapter) { bar.hidden = true; return; }
  const [a, b] = r;
  $("selRef").textContent = `${currentChapter.ref}:${a === b ? a : a + "\u2013" + b}`;
  bar.hidden = false;
}

$("selClearBtn").addEventListener("click", () => {
  selectedVerses.clear();
  document.querySelectorAll(".verse.sel").forEach(el => el.classList.remove("sel"));
  updateSelBar();
});

function buildExegesisPrompt() {
  const [a, b] = selRange();
  const ref = `${currentChapter.ref}:${a === b ? a : a + "\u2013" + b}`;
  const passage = chapterVerses
    .filter(v => v.n >= a && v.n <= b)
    .map(v => `${v.n} ${v.text}`)
    .join("\n");
  return `Please provide a careful exegesis of ${ref} (${currentChapter.trans}).

The passage:
${passage}

Please walk through:
1. Context — where this passage sits in the structure of ${currentChapter.book} and its historical setting.
2. Language — key terms in the original Hebrew or Greek and what they carry that English translation may not.
3. Canon — how this passage connects to the wider sweep of Scripture, with cross-references.
4. Theology — what this passage reveals about God, His character, and His purposes.
5. Application — honest implications for a thoughtful Christian reader today. Where the text holds tension, hold it; do not resolve it into formulas.

Audience: a theologically serious adult reader. Depth over devotional gloss.`;
}

function showToast(msg, ms = 3000) {
  const t = $("toast");
  t.textContent = msg;
  t.hidden = false;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.hidden = true; }, ms);
}

/* ---------- Anthropic API key (yours, stored only in this browser) ---------- */
function getApiKey() {
  try { return localStorage.getItem("bible.anthropicKey") || ""; } catch (e) { return ""; }
}
function saveApiKey(k) {
  try { localStorage.setItem("bible.anthropicKey", k); } catch (e) {}
}
function ensureApiKey() {
  let k = getApiKey();
  if (!k) {
    k = (window.prompt(
      "Paste your Anthropic API key (starts with sk-ant-).\nIt is stored only in this browser on this device \u2014 use the \uD83D\uDD11 button to change or remove it.", ""
    ) || "").trim();
    if (k) saveApiKey(k);
  }
  return k;
}
$("keyBtn").addEventListener("click", () => {
  const entry = window.prompt(
    "Anthropic API key for exegesis:\n(Clear the box and press OK to remove it from this device.)",
    getApiKey()
  );
  if (entry === null) return;
  saveApiKey(entry.trim());
});

/* ---------- Minimal markdown rendering for the exegesis text ---------- */
function renderMd(src) {
  const inline = s => s
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>");
  const lines = escapeHtml(src).split("\n");
  let html = "", para = [], list = null;
  const flushPara = () => { if (para.length) { html += `<p>${inline(para.join(" "))}</p>`; para = []; } };
  const closeList = () => { if (list) { html += list === "ul" ? "</ul>" : "</ol>"; list = null; } };
  for (const raw of lines) {
    const line = raw.trimEnd();
    const h = line.match(/^(#{1,4})\s+(.*)/);
    const ul = line.match(/^[-*]\s+(.*)/);
    const ol = line.match(/^\d+[.)]\s+(.*)/);
    if (h) { flushPara(); closeList(); html += `<${h[1].length <= 2 ? "h3" : "h4"}>${inline(h[2])}</${h[1].length <= 2 ? "h3" : "h4"}>`; }
    else if (ul) { flushPara(); if (list !== "ul") { closeList(); html += "<ul>"; list = "ul"; } html += `<li>${inline(ul[1])}</li>`; }
    else if (ol) { flushPara(); if (list !== "ol") { closeList(); html += "<ol>"; list = "ol"; } html += `<li>${inline(ol[1])}</li>`; }
    else if (line.trim() === "") { flushPara(); closeList(); }
    else para.push(line);
  }
  flushPara(); closeList();
  return html;
}

/* ---------- Integrated exegesis via the Anthropic API ---------- */
const EXEGESIS_MODEL = "claude-sonnet-4-6";

function mountExegesisPanel(ref) {
  const old = document.getElementById("exegesisPanel");
  if (old) old.remove();
  const panel = document.createElement("div");
  panel.className = "exegesis-panel";
  panel.id = "exegesisPanel";
  panel.innerHTML = `
    <div class="ex-head">
      <span>Exegesis \u2014 ${ref}</span>
      <button class="ex-close" title="Close">\u2715</button>
    </div>
    <div class="ex-body"><p class="ex-status">Preparing exegesis\u2026</p></div>`;
  panel.querySelector(".ex-close").addEventListener("click", () => panel.remove());
  const reader = $("reader");
  const pager = reader.querySelector(".pager");
  if (pager) reader.insertBefore(panel, pager); else reader.appendChild(panel);
  return panel.querySelector(".ex-body");
}

$("exegesisBtn").addEventListener("click", async () => {
  if (!currentChapter || !chapterVerses || !selRange()) return;
  const key = ensureApiKey();
  if (!key) return;

  const [a, b] = selRange();
  const ref = `${currentChapter.ref}:${a === b ? a : a + "\u2013" + b}`;
  const promptText = buildExegesisPrompt();
  const body = mountExegesisPanel(ref);
  body.closest(".exegesis-panel").scrollIntoView({ block: "nearest", behavior: "smooth" });

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "content-type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: EXEGESIS_MODEL,
        max_tokens: 3000,
        stream: true,
        messages: [{ role: "user", content: promptText }]
      })
    });

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); msg = (j.error && j.error.message) || msg; } catch (e) {}
      if (res.status === 401 || res.status === 403) {
        saveApiKey("");
        msg += " \u2014 the stored key was cleared; tap \uD83D\uDD11 to enter it again.";
      }
      body.innerHTML = `<p class="ex-status">Couldn't run the exegesis: ${escapeHtml(msg)}</p>`;
      return;
    }

    // Stream the response into the panel as it is written
    const sr = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", fullText = "";
    while (true) {
      const { done, value } = await sr.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split("\n");
      buffer = parts.pop();
      for (const line of parts) {
        if (!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if (!payload || payload === "[DONE]") continue;
        try {
          const ev = JSON.parse(payload);
          if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") {
            fullText += ev.delta.text;
            body.innerHTML = renderMd(fullText);
          }
        } catch (e) { /* partial JSON across chunks is expected; skip */ }
      }
    }
    if (!fullText) body.innerHTML = `<p class="ex-status">No text was returned \u2014 try again.</p>`;
  } catch (err) {
    body.innerHTML = `<p class="ex-status">Couldn't reach the Anthropic API (${escapeHtml(err.message)}). Check your connection and try again.</p>`;
  }
});

/* Text size — steps applied to the scripture body, remembered per device */
const SIZES = [0.95, 1.05, 1.16, 1.3, 1.5, 1.75];
let sizeIdx = 2;
try {
  const s = parseInt(localStorage.getItem("bible.textSize"), 10);
  if (!isNaN(s) && s >= 0 && s < SIZES.length) sizeIdx = s;
} catch (e) {}
function applySize() {
  document.documentElement.style.setProperty("--fs", SIZES[sizeIdx] + "rem");
  $("sizeDown").disabled = sizeIdx === 0;
  $("sizeUp").disabled = sizeIdx === SIZES.length - 1;
  try { localStorage.setItem("bible.textSize", sizeIdx); } catch (e) {}
}
$("sizeDown").addEventListener("click", () => { if (sizeIdx > 0) { sizeIdx--; applySize(); } });
$("sizeUp").addEventListener("click", () => { if (sizeIdx < SIZES.length - 1) { sizeIdx++; applySize(); } });
applySize();

/* Email the current chapter via the device's mail app.
   The recipient address is asked for once, then remembered as the default. */
function getSavedEmail() {
  try { return localStorage.getItem("bible.emailTo") || ""; } catch (e) { return ""; }
}
function saveEmail(addr) {
  try { localStorage.setItem("bible.emailTo", addr); } catch (e) {}
}

$("emailBtn").addEventListener("click", () => {
  if (!currentChapter) return;
  let to = getSavedEmail();
  if (!to) {
    to = (window.prompt("Email address to send chapters to?\n(Saved as your default — use the \u270E button to change it later.)", "") || "").trim();
    if (!to) return;
    saveEmail(to);
  }
  const subject = `${currentChapter.ref} (${currentChapter.trans})`;
  let body = currentChapter.text;
  const MAX = 7000; // very long chapters can exceed what mailto links allow
  if (body.length > MAX) {
    body = body.slice(0, MAX) + "\n\n… (chapter continues — read the rest in the Bible app)";
  }
  body += "\n\n" + subject;
  window.location.href =
    `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
});

$("emailEditBtn").addEventListener("click", () => {
  const current = getSavedEmail();
  const entry = window.prompt("Default email address for chapters:\n(Clear the box and press OK to remove it.)", current);
  if (entry === null) return;            // cancelled — keep as-is
  saveEmail(entry.trim());               // empty string clears the default
});

$("backBtn").addEventListener("click", () => {
  state.book = null;
  state.chapter = null;
  selectedVerses.clear();
  currentChapter = null;
  updateSelBar();
  showView("booksView");
});

transSelect.addEventListener("change", () => {
  state.translation = transSelect.value;
  try { localStorage.setItem("bible.defaultTranslation", state.translation); } catch (e) {}
  refreshGridState();
  if (NT_ONLY.has(state.translation) && state.book && OT.some(b => b[0] === state.book)) {
    state.book = null; state.chapter = null;
    showView("booksView");
    return;
  }
  if (state.book && state.chapter) loadChapter(state.book, state.chapter);
});

/* ---------- Init ---------- */
function restoreSavedTranslation() {
  let saved = null;
  try { saved = localStorage.getItem("bible.defaultTranslation"); } catch (e) {}
  if (!saved) return;
  const exists = [...transSelect.options].some(o => o.value === saved);
  if (exists) {
    transSelect.value = saved;
    state.translation = saved;
    refreshGridState();
  }
}

populateFreeTranslations();
restoreSavedTranslation();                     // free translations restore immediately
populateApiBibles().then(restoreSavedTranslation); // API.Bible ones restore once the catalog loads
refreshGridState();
</script>
